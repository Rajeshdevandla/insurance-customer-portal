apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-portal-backend
  labels:
    app: insurance-portal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: insurance-portal-backend
  template:
    spec:
      containers:
      - name: backend
        image: insurance-portal-backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: insurance-secrets
              key: db-url
---
apiVersion: v1
kind: Service
metadata:
  name: insurance-portal-backend-svc
spec:
  selector:
    app: insurance-portal-backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

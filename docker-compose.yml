version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: insurance_portal
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: portal_secret
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/insurance_portal
      DB_USERNAME: portal_user
      DB_PASSWORD: portal_secret
      REDIS_HOST: redis
    depends_on: [postgres, redis]

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  postgres_data:
